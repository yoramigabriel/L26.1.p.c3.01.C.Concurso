<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evaluacion virtual</title>
</head>

<body>

  <section id="Concurso" style="margin-top: 20px; border: 1px solid #ccc; padding: 15px; width: 300px;">
    <h5 id="concurso_lblConcurso">Procesar Concursos</h5>
    <div>
      <label>Cédula:
        <input type="number" id="concurso_inCedula" placeholder="Cédula">
      </label>
    </div>
    <div>
      <label>Nombre:
        <input type="text" id="concurso_inNombre" placeholder="Nombre">
      </label>
    </div>
    <div>
      <label>Puntaje Sec1:
        <input type="text" id="concurso_inTecnico " placeholder="Evaluaciones">
      </label>
      <label>Puntaje Sec2:
        <input type="text" id="concurso_inPsicometico" placeholder="Evaluaciones">
      </label>
      <label>Puntaje Sec3:
        <input type="text" id="concurso_inEntrevista" placeholder="Evaluaciones">
      </label>
    </div>
    <br>
    <button id="concurso_btEnviar">Enviar</button>
  </section>

  <script type="module">
    import Cl_cConcurso from "./dist/controllers/Cl_cConcurso.js";

    import Cl_vConcurso from "./dist/views/Cl_vConcurso.js";

    const vistaConcurso = new Cl_vConcurso();

    new Cl_cConcurso(vistaConcurso);
  </script>
</body>

</html>
