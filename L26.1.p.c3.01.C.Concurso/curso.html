<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evaluacion virtual</title>
</head>

<body>
  <section id="curso" style="margin-top: 20px; border: 1px solid #ccc; padding: 15px; width: 300px;">
    <h2>Administrar Evaluaciones</h2>
    <button id="curso_btVerEntregas">Ver entregas</button>
    <button id="curso_btAspirantes">Aspirantes</button>
  </section>
  <section id="entregas" hidden style="margin-top: 20px; border: 1px solid #ccc; padding: 15px; width: 300px;">
    <h2>Entrega</h2>
    <div>
      <table style="text-align: center;">
        <thead>
          <tr>
            <th>Cedula</th>
            <th>Nombre</th>
            <th>Evaluaciones</th>
            <th>Porcentaje</th>
            <th>Estatus</th>
          </tr>
        </thead>
        <tbody id="entregas_tblRegistros"></tbody>
      </table>
    </div>
    <br>
    <button id="entregas_btRecargar">Recargar</button>
    <label>
      <input id="entregas_chkSoloCorrectos" type="checkbox">Solo los Seleccionados
    </label>
    <br>
    <button id="entregas_btVolver" style="margin-top: 10px;">Volver</button>
  </section>
  <section id="aspirantes" hidden style="margin-top: 20px; border: 1px solid #ccc; padding: 15px; width: 300px;">
    <h2>Aspirantes</h2>
    <div style="display: flex; flex-direction: column;">
      <label>Cedula:
        <input type="number" id="aspirantes_inCedula" placeholder="Cedula">
      </label>
      <label>Nombre:
        <input type="text" id="aspirantes_inNombre" placeholder="Nombre">
      </label>
      <div style="display:flex; gap:6px; margin-top:6px;">
        <button id="aspirantes_btAgregar">Agregar</button>
        <button id="aspirantes_btModificar">Modificar</button>
        <button id="aspirantes_btEliminar">Eliminar</button>  
      </div>
    </div>
    <table style="text-align: center;margin-top: 10px; border: 1px solid #ccc;">
      <thead>
        <tr>
          <th>Cedula</th>
          <th>Nombre</th>
        </tr>
      </thead>
      <tbody id="aspirantes_tblRegistros"></tbody>
    </table>
    <br>
    <button id="aspirantes_btVolver" style="margin-top: 10px;">Volver</button>
  </section>

  <script type="module">
    import Cl_cCurso from "./dist/controllers/Cl_cCurso.js";
    import Cl_vCurso from "./dist/views/Cl_vCurso.js";

    const vCurso = new Cl_vCurso();

    new Cl_cCurso({ vista: vCurso });
  </script>
</body>

</html>
